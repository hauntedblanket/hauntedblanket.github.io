<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MOVIES • HAUNTED BLANKET</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body data-page="movies">
  <header>
    <nav aria-label="Main navigation">
      <a href="index.html">HOME</a>
      <a href="movies.html">MOVIES</a>
      <a href="games.html">GAMES</a>
      <a href="socials.html">SOCIALS</a>
    </nav>
  </header>
  <section class="hero compact-hero">
    <h1>MOVIES</h1>
    <img src="assets/movie-icon.png" class="home-icon-img" alt="">
    <p class="subtitle" data-hb-text="moviesSubtitle">CURATED HORROR SHELF</p>
  </section>
  
<section class="global-search-wrap">
  <input type="text" id="globalSearch" class="global-search" placeholder="SEARCH THE BLANKET..." />
  <div id="globalSearchResults" class="global-search-results"></div>
</section>

<main>
    <section class="section split-panel media-home-match">
      <div class="panel split-featured">
        <div class="section-header"><h2 data-hb-text="moviesFavoritesHeading">FAVORITE MOVIES</h2><p>FAVORITES</p></div>
        <div class="card-grid featured-grid" id="moviesFavoritesGrid"></div>
      </div>

      <div class="panel split-recent">
        <div class="section-header"><h2 data-hb-text="moviesAllHeading">ALL MOVIES</h2><p>COLLECTION</p></div>
        <div class="card-grid recent-grid" id="moviesGrid"></div>
      </div>
    </section>
  </main>

  <div class="media-modal" id="mediaModal" aria-hidden="true">
    <div class="media-modal-backdrop" onclick="closeMediaModal()"></div>
    <article class="media-modal-card" role="dialog" aria-modal="true" aria-label="Media details">
      <button class="media-modal-close" onclick="closeMediaModal()" aria-label="Close">×</button>
      <div id="mediaModalContent"></div>
    </article>
  </div>
  <footer data-hb-text="footer">HAUNTED BLANKET</footer>
  <a class="admin-link" href="admin.html">OWNER</a>
  <script src="data.js"></script>
  <script src="site.js"></script>
  <script>
    const data = window.HAUNTED_BLANKET_DATA || { media: [], socials: [] };
    function getVideoLink(item) {
      return item.youtube || item.youtubeUrl || item.video || item.videoUrl || item.trailer || item.trailerUrl || '';
    }
    function escapeHtml(text=''){return String(text).replace(/[&<>'"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]));}
    function embedUrl(url='') {
      const u = String(url || '').trim();
      if (!u) return '';
      const yt = u.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/shorts\/)([A-Za-z0-9_-]+)/);
      if (yt) return `https://www.youtube.com/embed/${yt[1]}`;
      return '';
    }
    function galleryMarkup(item) {
      const images = Array.isArray(item.gallery) ? item.gallery.filter(Boolean) : [];
      if (!images.length) return '';
      return `<div class="modal-gallery">${images.map(src => `<img src="${escapeHtml(src)}" alt="${escapeHtml(item.title)} screenshot">`).join('')}</div>`;
    }
    function trailerMarkup(item) {
      const link = getVideoLink(item);
      if (!link) return '';
      return `<div class="modal-actions">
        <a class="youtube-watch-btn" href="${escapeHtml(link)}" target="_blank" rel="noopener noreferrer">
          ▶ WATCH ON YOUTUBE ↗
        </a>
      </div>`;
    }
    function mediaCard(item){
      const index = data.media.indexOf(item);
      const img = item.image ? `<img class="poster" src="${escapeHtml(item.image)}" alt="${escapeHtml(item.title)} poster">` : `<div class="poster-placeholder">ADD COVER</div>`;
      const tags = (item.tags||[]).map(t=>`<span class="badge">${escapeHtml(t)}</span>`).join('');
      const favorite = item.favorite ? '<span class="favorite-pill">FAVORITE</span>' : '';
      const rating = item.rating ? `<p class="card-rating">RATING: ${escapeHtml(item.rating)}</p>` : '';
      return `<article class="card clickable-card" onclick="openMediaModal(${index})" tabindex="0" role="button" onkeydown="if(event.key==='Enter'||event.key===' '){event.preventDefault();openMediaModal(${index})}">
        ${img}
        <div class="card-topline">${favorite}</div>
        <h3 class="card-title">${escapeHtml(item.title)}</h3>
        <p class="card-meta">${escapeHtml(item.year||item.type)} • ${escapeHtml(item.mood||'LATE-NIGHT PICK')}</p>
        ${rating}
        <div class="badges">${tags}</div>
      </article>`;
    }

    function openMediaModal(index) {
      const item = data.media[index];
      if (!item) return;

      const img = item.image ? `<img class="modal-poster" src="${escapeHtml(item.image)}" alt="${escapeHtml(item.title)} poster">` : `<div class="poster-placeholder modal-placeholder">ADD COVER</div>`;
      const tags = (item.tags||[]).map(t=>`<span class="badge">${escapeHtml(t)}</span>`).join('');
      const rating = item.rating ? `<div class="detail-row"><strong>RATING</strong><span>${escapeHtml(item.rating)}</span></div>` : '';
      const mood = item.mood ? `<div class="detail-row"><strong>MOOD</strong><span>${escapeHtml(item.mood)}</span></div>` : '';
      const year = item.year ? `<div class="detail-row"><strong>YEAR</strong><span>${escapeHtml(item.year)}</span></div>` : '';
      const blurb = item.description ? `<p class="modal-blurb">${escapeHtml(item.description)}</p>` : `<p class="modal-blurb empty-blurb">NO BLURB YET</p>`;
      const trailer = trailerMarkup(item);
      const gallery = galleryMarkup(item);

      document.getElementById('mediaModalContent').innerHTML = `
        <div class="media-detail-layout">
          ${img}
          <div class="media-detail-copy">
            <p class="modal-kicker">${escapeHtml(item.type || '')}</p>
            <h2>${escapeHtml(item.title)}</h2>
            <div class="detail-list">${year}${rating}${mood}</div>
            ${blurb}
            ${trailer}
            ${gallery}
            <div class="badges">${tags}</div>
          </div>
        </div>
      `;

      document.getElementById('mediaModal').classList.add('open');
      document.getElementById('mediaModal').setAttribute('aria-hidden', 'false');
      document.body.classList.add('modal-open');
    }

    function closeMediaModal() {
      document.getElementById('mediaModal').classList.remove('open');
      document.getElementById('mediaModal').setAttribute('aria-hidden', 'true');
      document.body.classList.remove('modal-open');
    }

    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') closeMediaModal();
    });
  </script><script>
    const moviesItems = data.media.filter(x => x.type === 'movie');
    const moviesFavorites = moviesItems.filter(x => x.favorite);
    const moviesRest = moviesItems.filter(x => !x.favorite);
    document.getElementById('moviesFavoritesGrid').innerHTML = moviesFavorites.map(mediaCard).join('') || '<div class="poster-placeholder">NO FAVORITES YET</div>';
    document.getElementById('moviesGrid').innerHTML = moviesRest.map(mediaCard).join('') || '<div class="poster-placeholder">NO OTHER MOVIES YET</div>';
  </script>
<script>
  function forceTrailerButtons() {
    document.querySelectorAll('.media-modal.open, #mediaModal').forEach(modal => {
      const oldEmbeds = modal.querySelectorAll('iframe, .modal-trailer');
      oldEmbeds.forEach(el => {
        const wrapper = el.closest('.modal-trailer') || el;
        wrapper.remove();
      });

      const content = modal.querySelector('#mediaModalContent') || modal;
      if (!content || content.querySelector('.trailer-button')) return;

      const title = content.querySelector('h1, h2, h3')?.textContent?.trim()?.toLowerCase();
      const data = window.HAUNTED_BLANKET_DATA || {};
      const media = Array.isArray(data.media) ? data.media : [];
      const item = media.find(x => String(x.title || '').trim().toLowerCase() === title);

      if (!item || !item.trailer) return;

      const buttonWrap = document.createElement('div');
      buttonWrap.className = 'modal-trailer-link';
      buttonWrap.innerHTML = `<a href="${String(item.trailer).replace(/"/g, '&quot;')}" target="_blank" rel="noopener noreferrer" class="trailer-button">WATCH TRAILER ON YOUTUBE</a>`;

      const tags = content.querySelector('.modal-tags, .tags, .badges');
      if (tags) tags.before(buttonWrap);
      else content.appendChild(buttonWrap);
    });
  }

  document.addEventListener('click', () => setTimeout(forceTrailerButtons, 40));
  document.addEventListener('keydown', () => setTimeout(forceTrailerButtons, 40));
  setInterval(forceTrailerButtons, 500);
</script>
</body>
</html>
