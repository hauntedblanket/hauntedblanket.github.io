<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GAMES • HAUNTED BLANKET</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body data-page="games">
  <header>
    <nav aria-label="Main navigation">
      <a href="index.html">HOME</a>
      <a href="movies.html">MOVIES</a>
      <a href="games.html">GAMES</a>
      <a href="socials.html">SOCIALS</a>
    </nav>
  </header>
  <section class="hero compact-hero">
    <h1>GAMES</h1>
    <img src="assets/game-icon.png" class="page-icon-img" alt="Games">
    <p class="subtitle" data-hb-text="gamesSubtitle">COZY / HORROR BACKLOG</p>
  </section>
  
<section class="global-search-wrap">
  <input type="text" id="globalSearch" class="global-search" placeholder="SEARCH THE BLANKET..." />
  <div id="globalSearchResults" class="global-search-results"></div>
</section>

<main>
    <section class="section split-panel media-home-match">
      <div class="panel split-featured">
        <div class="section-header"><h2 data-hb-text="gamesFavoritesHeading">FAVORITE GAMES</h2><p>FAVORITES</p></div>
        <div class="card-grid featured-grid" id="gamesFavoritesGrid"></div>
      </div>

      <div class="panel split-recent">
        <div class="section-header"><h2 data-hb-text="gamesAllHeading">ALL GAMES</h2><p>COLLECTION</p></div>
        <div class="card-grid recent-grid" id="gamesGrid"></div>
      </div>
    </section>
  </main>

  <div class="media-modal" id="mediaModal" aria-hidden="true">
    <div class="media-modal-backdrop" onclick="closeMediaModal()"></div>
    <article class="media-modal-card" role="dialog" aria-modal="true" aria-label="Media details">
      <button class="media-modal-close" onclick="closeMediaModal()" aria-label="Close">×</button>
      <div id="mediaModalContent"></div>
    </article>
  </div>
  <footer data-hb-text="footer">HAUNTED BLANKET</footer>
  <script src="data.js"></script>
  <script src="site.js"></script>
  <script>
    const hb = window.HB_MEDIA;
    const gamesItems = hb.media.filter(x => String(x.type || '').toLowerCase() === 'game');
    const gamesFavorites = gamesItems.filter(x => x.favorite);
    const gamesRest = gamesItems.filter(x => !x.favorite);
    document.getElementById('gamesFavoritesGrid').innerHTML = gamesFavorites.map(item => hb.mediaCard(item, { showFavoritePill: true })).join('') || '<div class="poster-placeholder">NO FAVORITES YET</div>';
    document.getElementById('gamesGrid').innerHTML = gamesRest.map(item => hb.mediaCard(item, { showFavoritePill: true })).join('') || '<div class="poster-placeholder">NO OTHER GAMES YET</div>';
  </script>
</body>
</html>
